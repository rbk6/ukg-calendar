name: Sync UKG to Google Calendar

on:
  schedule:
    - cron: '0 20 * * 4,5,6'  # thursday, friday, saturday at 12pm PST
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Write secrets to disk
        env:
          ENV_CI: ${{ secrets.ENV_CI }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          printf '%s\n' "$ENV_CI" > .env
          echo 'HEADLESS=true' >> .env  # override schema default; no display available in CI
          printf '%s\n' "$GOOGLE_CREDENTIALS_JSON" > google-credentials.json

      - name: Run sync
        run: npm run start:ci
